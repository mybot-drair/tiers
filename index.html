<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DuckTiers – Rankings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <style>
    :root {
      --gold:    #f5c518;
      --orange:  #e87020;
      --blue:    #1a6fd4;
      --light-blue: #5ab4f5;
      --dark:    #0a0a0f;
      --dark2:   #0f0f1a;
      --dark3:   #14141f;
      --card-bg: #13131e;
      --border:  #1e1e2e;
      --text:    #e8e8f0;
      --muted:   #6b6b88;
      --ht1: #ff4444; --lt1: #ff7744;
      --ht2: #ff9944; --lt2: #ffcc44;
      --ht3: #f5c518; --lt3: #aacc22;
      --ht4: #44dd66; --lt4: #22ccaa;
      --ht5: #4499ff; --lt5: #6677cc;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--dark);
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
      font-size: 16px;
      line-height: 1.5;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── BACKGROUND ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba(26,111,212,0.18) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 100%, rgba(232,112,32,0.10) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    /* grid lines */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── HEADER ── */
    header {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 48px 20px 32px;
      border-bottom: 1px solid var(--border);
    }

    .logo-wrap {
      display: inline-block;
      position: relative;
    }

    .logo-wrap img {
      height: 130px;
      filter: drop-shadow(0 0 30px rgba(245,197,24,0.4)) drop-shadow(0 0 60px rgba(232,112,32,0.2));
      animation: logoFloat 4s ease-in-out infinite;
    }

    @keyframes logoFloat {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-8px); }
    }

    .tagline {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.8rem;
      color: var(--muted);
      letter-spacing: 0.25em;
      text-transform: uppercase;
      margin-top: 12px;
    }

    /* ── CONTROLS ── */
    .controls {
      position: relative;
      z-index: 10;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      align-items: center;
      padding: 24px 20px;
      border-bottom: 1px solid var(--border);
    }

    .search-wrap {
      position: relative;
      flex: 1;
      max-width: 320px;
    }

    .search-wrap svg {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      opacity: 0.4;
      pointer-events: none;
    }

    #search {
      width: 100%;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      padding: 10px 12px 10px 38px;
      outline: none;
      transition: border-color .2s;
    }
    #search:focus { border-color: var(--blue); }
    #search::placeholder { color: var(--muted); font-weight: 400; }

    .gm-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .tab {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--muted);
      cursor: pointer;
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      padding: 7px 14px;
      text-transform: uppercase;
      transition: all .2s;
      white-space: nowrap;
    }
    .tab:hover { border-color: var(--blue); color: var(--text); }
    .tab.active {
      background: var(--blue);
      border-color: var(--blue);
      color: #fff;
      box-shadow: 0 0 14px rgba(26,111,212,0.5);
    }

    /* ── STATS BAR ── */
    .stats-bar {
      position: relative;
      z-index: 10;
      display: flex;
      gap: 24px;
      justify-content: center;
      flex-wrap: wrap;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.78rem;
      color: var(--muted);
    }
    .stats-bar span { color: var(--gold); }

    /* ── TIER SECTIONS ── */
    main {
      position: relative;
      z-index: 5;
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 20px 80px;
    }

    .tier-section {
      margin-bottom: 10px;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid var(--border);
      animation: fadeIn .4s ease both;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .tier-header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 18px;
      cursor: pointer;
      user-select: none;
      position: relative;
    }

    .tier-badge {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.5rem;
      letter-spacing: 0.08em;
      min-width: 70px;
      text-align: center;
      padding: 2px 10px;
      border-radius: 4px;
    }

    .tier-count {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.75rem;
      color: var(--muted);
      margin-left: auto;
    }

    .tier-chevron {
      color: var(--muted);
      transition: transform .3s;
      font-size: 0.75rem;
    }
    .tier-section.collapsed .tier-chevron { transform: rotate(-90deg); }

    /* tier color theming */
    .t-ht1 { background: linear-gradient(135deg,#1c0505,#0d0d0d); }
    .t-ht1 .tier-header { border-bottom: 1px solid #3a0a0a; }
    .t-ht1 .tier-badge { background: var(--ht1); color: #000; }

    .t-lt1 { background: linear-gradient(135deg,#1a0a03,#0d0d0d); }
    .t-lt1 .tier-header { border-bottom: 1px solid #331500; }
    .t-lt1 .tier-badge { background: var(--lt1); color: #000; }

    .t-ht2 { background: linear-gradient(135deg,#1a0f02,#0d0d0d); }
    .t-ht2 .tier-header { border-bottom: 1px solid #2e1a00; }
    .t-ht2 .tier-badge { background: var(--ht2); color: #000; }

    .t-lt2 { background: linear-gradient(135deg,#191500,#0d0d0d); }
    .t-lt2 .tier-header { border-bottom: 1px solid #2c2200; }
    .t-lt2 .tier-badge { background: var(--lt2); color: #000; }

    .t-ht3 { background: linear-gradient(135deg,#181400,#0d0d0d); }
    .t-ht3 .tier-header { border-bottom: 1px solid #292000; }
    .t-ht3 .tier-badge { background: var(--ht3); color: #000; }

    .t-lt3 { background: linear-gradient(135deg,#0e1400,#0d0d0d); }
    .t-lt3 .tier-header { border-bottom: 1px solid #1a2200; }
    .t-lt3 .tier-badge { background: var(--lt3); color: #000; }

    .t-ht4 { background: linear-gradient(135deg,#001a08,#0d0d0d); }
    .t-ht4 .tier-header { border-bottom: 1px solid #002e10; }
    .t-ht4 .tier-badge { background: var(--ht4); color: #000; }

    .t-lt4 { background: linear-gradient(135deg,#001614,#0d0d0d); }
    .t-lt4 .tier-header { border-bottom: 1px solid #002420; }
    .t-lt4 .tier-badge { background: var(--lt4); color: #000; }

    .t-ht5 { background: linear-gradient(135deg,#011126,#0d0d0d); }
    .t-ht5 .tier-header { border-bottom: 1px solid #031b3a; }
    .t-ht5 .tier-badge { background: var(--ht5); color: #000; }

    .t-lt5 { background: linear-gradient(135deg,#080e22,#0d0d0d); }
    .t-lt5 .tier-header { border-bottom: 1px solid #0e1530; }
    .t-lt5 .tier-badge { background: var(--lt5); color: #fff; }

    /* ── PLAYER GRID ── */
    .tier-body {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 1px;
      background: var(--border);
      overflow: hidden;
    }
    .tier-section.collapsed .tier-body { display: none; }

    .player-card {
      background: var(--dark2);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 16px 10px 14px;
      cursor: pointer;
      transition: background .15s;
      text-decoration: none;
      color: inherit;
    }
    .player-card:hover { background: var(--dark3); }

    .player-skin {
      width: 48px;
      height: 80px;
      object-fit: contain;
      image-rendering: pixelated;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,0.6));
    }

    .player-name {
      font-family: 'Rajdhani', sans-serif;
      font-weight: 700;
      font-size: 0.9rem;
      letter-spacing: 0.03em;
      text-align: center;
      word-break: break-all;
      color: var(--text);
    }

    /* ── EMPTY / LOADING ── */
    .empty {
      text-align: center;
      padding: 80px 20px;
      color: var(--muted);
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.9rem;
    }
    .empty big {
      display: block;
      font-size: 2.5rem;
      margin-bottom: 12px;
      opacity: 0.3;
    }

    .loader {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      padding: 80px 20px;
      color: var(--muted);
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.85rem;
    }
    .loader-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--blue);
      animation: pulse 1.2s ease-in-out infinite;
    }
    .loader-dot:nth-child(2) { animation-delay: .2s; background: var(--gold); }
    .loader-dot:nth-child(3) { animation-delay: .4s; background: var(--orange); }

    @keyframes pulse {
      0%,100% { opacity: 0.2; transform: scale(0.8); }
      50%      { opacity: 1;   transform: scale(1.2); }
    }

    /* ── FOOTER ── */
    footer {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 20px;
      border-top: 1px solid var(--border);
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.72rem;
      color: var(--muted);
    }
    footer a { color: var(--blue); text-decoration: none; }

    /* ── NO RESULTS ── */
    #no-results {
      display: none;
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
      font-family: 'Share Tech Mono', monospace;
    }

    /* ── MODAL ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(4px);
      z-index: 100;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      max-width: 360px;
      width: 100%;
      overflow: hidden;
      animation: modalIn .2s ease;
    }
    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.92); }
      to   { opacity: 1; transform: scale(1); }
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }
    .modal-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.4rem;
      letter-spacing: 0.05em;
    }
    .modal-close {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 1.2rem;
      line-height: 1;
      padding: 4px 8px;
      border-radius: 4px;
      transition: color .2s;
    }
    .modal-close:hover { color: var(--text); }

    .modal-body {
      display: flex;
      gap: 20px;
      align-items: flex-start;
      padding: 24px 20px;
    }

    .modal-skin {
      width: 64px;
      image-rendering: pixelated;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,0.8));
    }

    .modal-info { flex: 1; }
    .modal-info h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.6rem;
      letter-spacing: 0.05em;
      line-height: 1;
      margin-bottom: 12px;
    }

    .modal-rows { display: flex; flex-direction: column; gap: 6px; }
    .modal-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.88rem;
    }
    .modal-row .label { color: var(--muted); font-weight: 500; }
    .modal-row .val { font-weight: 700; font-family: 'Share Tech Mono', monospace; font-size: 0.82rem; }

    .modal-tier-badge {
      display: inline-block;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1rem;
      padding: 2px 10px;
      border-radius: 4px;
      letter-spacing: 0.06em;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      .logo-wrap img { height: 90px; }
      .tier-body { grid-template-columns: repeat(auto-fill, minmax(120px,1fr)); }
    }
  </style>
</head>
<body>

<header>
  <div class="logo-wrap">
    <img src="https://i.imgur.com/placeholder.png" alt="DuckTiers" id="logo-img"
         onerror="this.style.display='none'; document.getElementById('logo-text').style.display='block'" />
    <div id="logo-text" style="display:none; font-family:'Bebas Neue',sans-serif; font-size:3.5rem; letter-spacing:.1em; background:linear-gradient(135deg,#f5c518,#e87020); -webkit-background-clip:text; -webkit-text-fill-color:transparent;">
      DUCK<span style="background:linear-gradient(135deg,#5ab4f5,#1a6fd4); -webkit-background-clip:text; -webkit-text-fill-color:transparent;">TIERS</span>
    </div>
  </div>
  <p class="tagline">Minecraft PvP Stat Tierlist</p>
</header>

<div class="controls">
  <div class="search-wrap">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input type="text" id="search" placeholder="Search player…" autocomplete="off" />
  </div>
  <div class="gm-tabs" id="gm-tabs">
    <button class="tab active" data-gm="all">All</button>
    <button class="tab" data-gm="crystal">🔷 Crystal</button>
    <button class="tab" data-gm="sword">⚔️ Sword</button>
    <button class="tab" data-gm="diapot">🧪 Diapot</button>
    <button class="tab" data-gm="nethpot">🍵 Nethpot</button>
    <button class="tab" data-gm="smp">🌍 SMP</button>
    <button class="tab" data-gm="mace">🔨 Mace</button>
    <button class="tab" data-gm="axe">🪓 Axe</button>
    <button class="tab" data-gm="uhc">💀 UHC</button>
  </div>
</div>

<div class="stats-bar" id="stats-bar">
  <div>Loading…</div>
</div>

<main id="main">
  <div class="loader">
    <div class="loader-dot"></div>
    <div class="loader-dot"></div>
    <div class="loader-dot"></div>
    <span style="margin-left:8px">Fetching tier data…</span>
  </div>
</main>

<div id="no-results">
  <big>🦆</big>
  No players found matching your search.
</div>

<footer>
  DuckTiers · Data synced from Discord bot ·
  <a href="https://discord.gg/" target="_blank">Join Discord</a>
</footer>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal">
    <div class="modal-header">
      <span class="modal-title" id="modal-title">Player</span>
      <button class="modal-close" id="modal-close">✕</button>
    </div>
    <div class="modal-body">
      <img class="modal-skin" id="modal-skin" src="" alt="" />
      <div class="modal-info">
        <h2 id="modal-name"></h2>
        <div class="modal-rows" id="modal-rows"></div>
      </div>
    </div>
  </div>
</div>

<script>
const TIERS_URL = 'https://raw.githubusercontent.com/mybot-drair/tiers/main/tiers.json';

const TIER_ORDER = ['ht1','lt1','ht2','lt2','ht3','lt3','ht4','lt4','ht5','lt5'];

const TIER_LABELS = {
  ht1:'HT1', lt1:'LT1', ht2:'HT2', lt2:'LT2',
  ht3:'HT3', lt3:'LT3', ht4:'HT4', lt4:'LT4',
  ht5:'HT5', lt5:'LT5'
};

const TIER_FULL = {
  ht1:'High Tier 1', lt1:'Low Tier 1', ht2:'High Tier 2', lt2:'Low Tier 2',
  ht3:'High Tier 3', lt3:'Low Tier 3', ht4:'High Tier 4', lt4:'Low Tier 4',
  ht5:'High Tier 5', lt5:'Low Tier 5'
};

const GM_LABELS = {
  crystal:'Crystal', sword:'Sword', diapot:'Diapot',
  nethpot:'Nethpot', smp:'SMP', mace:'Mace', axe:'Axe', uhc:'UHC'
};

const GM_EMOJI = {
  crystal:'🔷', sword:'⚔️', diapot:'🧪',
  nethpot:'🍵', smp:'🌍', mace:'🔨', axe:'🪓', uhc:'💀'
};

let allPlayers = [];
let currentGm = 'all';
let currentSearch = '';
let collapsed = {};

function skinUrl(username) {
  return `https://minotar.net/armor/body/${username}/100.png`;
}

function parseTierKey(tierKey) {
  // tier_key like "lt3_sword"
  const parts = tierKey.split('_');
  const level = parts[0];
  const gm = parts.slice(1).join('_');
  return { level, gm };
}

async function fetchData() {
  try {
    const r = await fetch(TIERS_URL + '?t=' + Date.now());
    const json = await r.json();
    allPlayers = json.players || [];
    render();
  } catch(e) {
    document.getElementById('main').innerHTML =
      '<div class="empty"><big>⚠️</big>Failed to load tier data. Check the GitHub repo.</div>';
  }
}

function getFilteredPlayers() {
  let list = allPlayers;
  if (currentGm !== 'all') list = list.filter(p => p.gamemode === currentGm);
  if (currentSearch) {
    const q = currentSearch.toLowerCase();
    list = list.filter(p => p.username && p.username.toLowerCase().includes(q));
  }
  return list;
}

function groupByTier(players) {
  const groups = {};
  for (const t of TIER_ORDER) groups[t] = [];
  for (const p of players) {
    const level = p.tier_key ? parseTierKey(p.tier_key).level : null;
    if (level && groups[level]) groups[level].push(p);
  }
  return groups;
}

function tierColor(level) {
  const map = {
    ht1:'#ff4444', lt1:'#ff7744', ht2:'#ff9944', lt2:'#ffcc44',
    ht3:'#f5c518', lt3:'#aacc22', ht4:'#44dd66', lt4:'#22ccaa',
    ht5:'#4499ff', lt5:'#6677cc'
  };
  return map[level] || '#888';
}

function render() {
  const players = getFilteredPlayers();
  const groups = groupByTier(players);

  const main = document.getElementById('main');
  const noResults = document.getElementById('no-results');

  // stats bar
  const statsBar = document.getElementById('stats-bar');
  const totalRanked = allPlayers.length;
  const filtered = players.length;
  const gamemodes = [...new Set(allPlayers.map(p => p.gamemode))].length;
  statsBar.innerHTML = `
    <div>Total ranked: <span>${totalRanked}</span></div>
    <div>Showing: <span>${filtered}</span></div>
    <div>Gamemodes: <span>${gamemodes}</span></div>
  `;

  if (players.length === 0 && currentSearch) {
    main.innerHTML = '';
    noResults.style.display = 'block';
    return;
  }
  noResults.style.display = 'none';

  const hasAny = TIER_ORDER.some(t => groups[t].length > 0);
  if (!hasAny) {
    main.innerHTML = '<div class="empty"><big>🦆</big>No players ranked yet.</div>';
    return;
  }

  main.innerHTML = '';

  for (const level of TIER_ORDER) {
    const tierPlayers = groups[level];
    if (tierPlayers.length === 0) continue;

    const isCollapsed = collapsed[level];
    const color = tierColor(level);
    const label = TIER_LABELS[level];

    const section = document.createElement('div');
    section.className = `tier-section t-${level}${isCollapsed ? ' collapsed' : ''}`;
    section.dataset.level = level;

    section.innerHTML = `
      <div class="tier-header" data-level="${level}">
        <div class="tier-badge" style="background:${color};color:${['lt5'].includes(level)?'#fff':'#000'}">${label}</div>
        <div style="font-size:.9rem;color:#aaa;font-weight:600">${TIER_FULL[level]}</div>
        <div class="tier-count">${tierPlayers.length} player${tierPlayers.length!==1?'s':''}</div>
        <div class="tier-chevron">▼</div>
      </div>
      <div class="tier-body" id="body-${level}"></div>
    `;

    main.appendChild(section);

    const body = section.querySelector(`#body-${level}`);
    for (const p of tierPlayers) {
      const card = document.createElement('div');
      card.className = 'player-card';
      card.dataset.username = p.username;
      card.dataset.gm = p.gamemode;
      card.dataset.tier = p.tier;
      card.dataset.tierKey = p.tier_key || '';
      card.innerHTML = `
        <img class="player-skin"
          src="${skinUrl(p.username)}"
          alt="${p.username}"
          onerror="this.src='https://minotar.net/helm/${p.username}/100.png'"
          loading="lazy" />
        <div class="player-name">${p.username}</div>
      `;
      card.addEventListener('click', () => openModal(p));
      body.appendChild(card);
    }

    section.querySelector('.tier-header').addEventListener('click', () => {
      collapsed[level] = !collapsed[level];
      section.classList.toggle('collapsed', collapsed[level]);
    });
  }
}

function openModal(p) {
  const overlay = document.getElementById('modal-overlay');
  const level = p.tier_key ? parseTierKey(p.tier_key).level : '??';
  const color = tierColor(level);
  const textColor = ['lt5'].includes(level) ? '#fff' : '#000';
  const gmLabel = GM_LABELS[p.gamemode] || p.gamemode;
  const gmEmoji = GM_EMOJI[p.gamemode] || '';

  document.getElementById('modal-title').textContent = p.username;
  document.getElementById('modal-name').textContent = p.username;
  document.getElementById('modal-skin').src = skinUrl(p.username);
  document.getElementById('modal-skin').onerror = function() {
    this.src = `https://minotar.net/helm/${p.username}/100.png`;
  };

  document.getElementById('modal-rows').innerHTML = `
    <div class="modal-row">
      <span class="label">Tier</span>
      <span class="val">
        <span class="modal-tier-badge" style="background:${color};color:${textColor}">
          ${TIER_LABELS[level] || level.toUpperCase()}
        </span>
      </span>
    </div>
    <div class="modal-row">
      <span class="label">Full Tier</span>
      <span class="val">${p.tier || '—'}</span>
    </div>
    <div class="modal-row">
      <span class="label">Gamemode</span>
      <span class="val">${gmEmoji} ${gmLabel}</span>
    </div>
  `;

  overlay.classList.add('open');
}

// close modal
document.getElementById('modal-close').addEventListener('click', () => {
  document.getElementById('modal-overlay').classList.remove('open');
});
document.getElementById('modal-overlay').addEventListener('click', (e) => {
  if (e.target === e.currentTarget)
    document.getElementById('modal-overlay').classList.remove('open');
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape')
    document.getElementById('modal-overlay').classList.remove('open');
});

// tabs
document.getElementById('gm-tabs').addEventListener('click', (e) => {
  const tab = e.target.closest('.tab');
  if (!tab) return;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  currentGm = tab.dataset.gm;
  render();
});

// search
document.getElementById('search').addEventListener('input', (e) => {
  currentSearch = e.target.value.trim();
  render();
});

// set logo
(function() {
  const logoImg = document.getElementById('logo-img');
  // Try to load the logo from GitHub raw (user should upload it to the repo)
  logoImg.src = 'https://raw.githubusercontent.com/mybot-drair/tiers/main/logo.png';
})();

fetchData();

// auto-refresh every 60 seconds
setInterval(fetchData, 60000);
</script>
</body>
</html>
