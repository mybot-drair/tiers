<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DUCKTIERS - Rankings</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0e1a;
            --bg-secondary: #12172a;
            --bg-card: #1a2033;
            --text-primary: #ffffff;
            --text-secondary: #a0aec0;
            --border-color: #2d3548;
            --accent-blue: #3b82f6;
            --tier-s: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%);
            --tier-a: linear-gradient(135deg, #c0c0c0 0%, #e8e8e8 100%);
            --tier-b: linear-gradient(135deg, #cd7f32 0%, #f4a460 100%);
            --tier-c: linear-gradient(135deg, #4ade80 0%, #86efac 100%);
            --tier-d: linear-gradient(135deg, #60a5fa 0%, #93c5fd 100%);
            --tier-f: linear-gradient(135deg, #ef4444 0%, #f87171 100%);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding-bottom: 80px;
        }

        /* Navigation Skip */
        .nav-skip {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1000;
        }

        .nav-skip-logo {
            width: 60px;
            height: auto;
            display: block;
            transition: transform 0.3s ease;
        }

        .nav-skip-logo:hover {
            transform: scale(1.1);
        }

        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: var(--bg-secondary);
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: space-around;
            padding: 8px 0;
            z-index: 999;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 8px 16px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 12px;
            transition: color 0.3s ease;
        }

        .nav-item:hover {
            color: var(--text-primary);
        }

        .nav-item.active {
            color: var(--accent-blue);
        }

        .nav-icon {
            width: 24px;
            height: 24px;
        }

        /* Tier Navigation */
        .tier-nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background-color: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            overflow-x: auto;
            padding: 12px 20px;
            gap: 8px;
            z-index: 998;
            scrollbar-width: none;
        }

        .tier-nav::-webkit-scrollbar {
            display: none;
        }

        .tier-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            white-space: nowrap;
            transition: all 0.3s ease;
        }

        .tier-item:hover {
            background-color: rgba(59, 130, 246, 0.1);
            border-color: var(--accent-blue);
        }

        .tier-item.active {
            background: var(--accent-blue);
            border-color: var(--accent-blue);
        }

        .tier-icon {
            width: 20px;
            height: 20px;
        }

        /* Main Content */
        .main-content {
            max-width: 1400px;
            margin: 80px auto 0;
            padding: 20px;
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 20px;
        }

        @media (max-width: 1024px) {
            .main-content {
                grid-template-columns: 1fr;
            }

            .info-sidebar {
                position: static;
                width: 100%;
            }
        }

        /* Info Sidebar */
        .info-sidebar {
            position: sticky;
            top: 100px;
            height: fit-content;
        }

        .info-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px;
        }

        .info-card h2 {
            font-size: 20px;
            margin-bottom: 20px;
            color: var(--text-primary);
        }

        .server-info {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .server-logo {
            width: 120px;
            height: auto;
            border-radius: 12px;
        }

        .server-details {
            text-align: center;
            width: 100%;
        }

        .server-details h3 {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .server-ip {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
            background-color: var(--bg-secondary);
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        /* Rankings Container */
        .rankings-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Tier Sections */
        .tier-section {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
        }

        .tier-header {
            font-size: 32px;
            font-weight: 700;
            padding: 20px 24px;
            margin: 0;
            background: var(--bg-secondary);
            border-bottom: 2px solid;
        }

        .tier-s .tier-header {
            background: var(--tier-s);
            color: #000;
            border-bottom-color: #ffd700;
        }

        .tier-a .tier-header {
            background: var(--tier-a);
            color: #000;
            border-bottom-color: #c0c0c0;
        }

        .tier-b .tier-header {
            background: var(--tier-b);
            color: #fff;
            border-bottom-color: #cd7f32;
        }

        .tier-c .tier-header {
            background: var(--tier-c);
            color: #000;
            border-bottom-color: #4ade80;
        }

        .tier-d .tier-header {
            background: var(--tier-d);
            color: #000;
            border-bottom-color: #60a5fa;
        }

        .tier-f .tier-header {
            background: var(--tier-f);
            color: #fff;
            border-bottom-color: #ef4444;
        }

        .tier-content {
            padding: 20px;
        }

        /* Player Cards */
        .player-cards {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 16px;
        }

        .player-card {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .player-card:hover {
            transform: translateY(-2px);
            border-color: var(--accent-blue);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.2);
        }

        .player-rank {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-secondary);
            min-width: 30px;
        }

        .player-avatar {
            width: 48px;
            height: 48px;
            border-radius: 8px;
            object-fit: cover;
        }

        .player-info {
            flex: 1;
        }

        .player-name {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .player-region {
            font-size: 12px;
            color: var(--text-secondary);
            padding: 2px 8px;
            background-color: rgba(59, 130, 246, 0.2);
            border-radius: 4px;
            display: inline-block;
        }

        /* Loading State */
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }

        /* Empty State */
        .empty-tier {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
            font-style: italic;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 20px;
            color: var(--text-secondary);
            font-size: 14px;
            margin-top: 40px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .player-cards {
                grid-template-columns: 1fr;
            }

            .main-content {
                padding: 16px;
                margin-top: 70px;
            }

            .tier-nav {
                padding: 8px 16px;
            }

            .nav-skip {
                top: 10px;
                left: 10px;
            }

            .nav-skip-logo {
                width: 50px;
            }
        }

        /* Scrollbar Styling */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-secondary);
        }
    </style>

    <script>
        // ============================================
        // CONFIGURATION - UPDATE THIS URL
        // ============================================
        const GITHUB_JSON_URL = 'https://raw.githubusercontent.com/YOUR_USERNAME/YOUR_REPO/main/tiers.json';
        // Example: 'https://raw.githubusercontent.com/johndoe/ducktiers/main/tiers.json'

        // Logo will be loaded from the same directory as this HTML file
        const LOGO_FILENAME = 'ducktiers_logo.webp';

        // ============================================
        // SCRIPT - DON'T MODIFY BELOW UNLESS YOU KNOW WHAT YOU'RE DOING
        // ============================================

        // Set logo sources
        document.getElementById('logo-img').src = LOGO_FILENAME;
        document.getElementById('server-logo-img').src = LOGO_FILENAME;

        // Tier mapping
        const tierContainers = {
            'S': document.getElementById('tier-S-players'),
            'A': document.getElementById('tier-A-players'),
            'B': document.getElementById('tier-B-players'),
            'C': document.getElementById('tier-C-players'),
            'D': document.getElementById('tier-D-players'),
            'F': document.getElementById('tier-F-players')
        };

        // Function to get Minecraft avatar
        function getMinecraftAvatar(username) {
            return `https://mc-heads.net/avatar/${username}/48`;
        }

        // Function to create player card
        function createPlayerCard(player, index) {
            const card = document.createElement('div');
            card.className = 'player-card';
            
            const rank = document.createElement('div');
            rank.className = 'player-rank';
            rank.textContent = `#${index + 1}`;
            
            const avatar = document.createElement('img');
            avatar.className = 'player-avatar';
            avatar.src = getMinecraftAvatar(player.name || player.player);
            avatar.alt = `${player.name || player.player} avatar`;
            avatar.onerror = function() {
                this.src = 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48"><rect fill="%23666" width="48" height="48"/></svg>';
            };
            
            const info = document.createElement('div');
            info.className = 'player-info';
            
            const name = document.createElement('div');
            name.className = 'player-name';
            name.textContent = player.name || player.player;
            
            info.appendChild(name);
            
            if (player.region) {
                const region = document.createElement('span');
                region.className = 'player-region';
                region.textContent = player.region;
                info.appendChild(region);
            }
            
            card.appendChild(rank);
            card.appendChild(avatar);
            card.appendChild(info);
            
            return card;
        }

        // Function to load tiers data
        async function loadTiers() {
            try {
                // Show loading state
                Object.values(tierContainers).forEach(container => {
                    if (container) {
                        container.innerHTML = '<div class="loading">Loading players...</div>';
                    }
                });

                const response = await fetch(GITHUB_JSON_URL);
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                
                // Clear loading state
                Object.values(tierContainers).forEach(container => {
                    if (container) {
                        container.innerHTML = '';
                    }
                });

                // Populate each tier
                Object.keys(tierContainers).forEach(tier => {
                    const container = tierContainers[tier];
                    if (!container) return;

                    // Get players for this tier
                    const players = data[tier] || data[tier.toLowerCase()] || [];
                    
                    if (players.length === 0) {
                        container.innerHTML = '<div class="empty-tier">No players in this tier yet</div>';
                        return;
                    }

                    // Create and append player cards
                    players.forEach((player, index) => {
                        const card = createPlayerCard(player, index);
                        container.appendChild(card);
                    });
                });

            } catch (error) {
                console.error('Error loading tiers:', error);
                
                // Show error state
                Object.values(tierContainers).forEach(container => {
                    if (container) {
                        container.innerHTML = `<div class="empty-tier">Error loading data. Please check your GitHub JSON URL at the top of this file.</div>`;
                    }
                });
            }
        }

        // Load tiers when page loads
        document.addEventListener('DOMContentLoaded', loadTiers);

        // Reload data every 5 minutes
        setInterval(loadTiers, 5 * 60 * 1000);
    </script>
</body>
</html>
